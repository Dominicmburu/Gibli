<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Login | Marketplace</title>
		<script src="https://cdn.tailwindcss.com"></script>
	</head>
	<body class="bg-gray-100 flex items-center justify-center min-h-screen">
		<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
			<h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Login to Your Account</h2>
			<form id="loginForm" class="space-y-4">
				<div>
					<label for="email" class="block text-sm font-medium text-gray-700">Email</label>
					<input
						type="email"
						id="email"
						name="email"
						class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
						required
					/>
				</div>
				<div>
					<label for="password" class="block text-sm font-medium text-gray-700">Password</label>
					<div class="relative">
						<input
							type="password"
							id="password"
							name="password"
							class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
							required
						/>
						<button type="button" id="togglePassword" class="absolute right-3 top-3 text-gray-500 text-sm">
							Show
						</button>
					</div>
				</div>
				<button
					type="submit"
					class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-xl shadow-md"
				>
					Login
				</button>
				<p id="errorText" class="text-red-600 text-sm text-center mt-2 hidden"></p>
				<p class="text-sm text-center text-muted mt-4">
					Don't have an account?
					<a href="register.html" class="text-blue-600 hover:underline font-semibold">Sign up</a>
				</p>
			</form>
		</div>

		<script>
			const form = document.getElementById('loginForm');
			const togglePassword = document.getElementById('togglePassword');
			const passwordInput = document.getElementById('password');
			const errorText = document.getElementById('errorText');

			togglePassword.addEventListener('click', () => {
				const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
				passwordInput.setAttribute('type', type);
				togglePassword.textContent = type === 'password' ? 'Show' : 'Hide';
			});

			form.addEventListener('submit', async (e) => {
				e.preventDefault();

				const email = document.getElementById('email').value;
				const password = passwordInput.value;

				try {
					const response = await fetch('http://localhost:5000/users/login', {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json',
						},
						body: JSON.stringify({ Email: email, Password: password }),
					});

					const data = await response.json();

					if (response.ok && data.token) {
						localStorage.setItem('token', data.token);

						const role = JSON.parse(atob(data.token.split('.')[1])).role;
						if (role === 'Admin') {
							window.location.href = 'adminHome.html';
						} else if (role === 'Seller') {
							window.location.href = 'home.html';
						} else {
							window.location.href = 'home.html';
						}
					} else {
						errorText.textContent = data.message || 'Login failed';
						errorText.classList.remove('hidden');
					}
				} catch (err) {
					errorText.textContent = 'Something went wrong. Try again.';
					errorText.classList.remove('hidden');
				}
			});
		</script>
	</body>
</html>
