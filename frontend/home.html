<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Marketplace - Home</title>

		<!-- Tailwind CDN -->
		<script src="https://cdn.tailwindcss.com"></script>

		<!-- Toastify CSS -->
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />

		<style>
			:root {
				/* Primary Brand Colors */
				--primary: #0d6efd;
				--primary-dark: #0a58ca;
				--primary-light: #e7f0fe;

				/* Accent Color */
				--accent: #f97316;
				--accent-dark: #c2410c;
				--accent-light: #fef3e7;

				/* Neutral Colors */
				--background: #f9fafb;
				--surface: #ffffff;
				--border: #e5e7eb;
				--shadow: rgba(0, 0, 0, 0.05);

				/* Text Colors */
				--text-primary: #1f2937;
				--text-secondary: #4b5563;
				--text-muted: #9ca3af;

				/* Semantic Colors */
				--success: #10b981;
				--warning: #f59e0b;
				--error: #ef4444;
				--info: #3b82f6;

				/* State Colors */
				--hover: #eff6ff;
				--active: #dbeafe;
				--disabled: #e5e7eb;
			}

			/* Tailwind custom colors via CSS variables */
			.bg-primary {
				background-color: var(--primary);
			}
			.text-primary {
				color: var(--text-primary);
			}
			.text-secondary {
				color: var(--text-secondary);
			}
			.text-muted {
				color: var(--text-muted);
			}
			.bg-surface {
				background-color: var(--surface);
			}
			.border-border {
				border-color: var(--border);
			}
			.hover-bg-hover:hover {
				background-color: var(--hover);
			}
			.btn-primary {
				background-color: var(--primary);
				color: white;
			}
			.btn-primary:hover {
				background-color: var(--primary-dark);
			}
			.btn-accent {
				background-color: var(--accent);
				color: white;
			}
			.btn-accent:hover {
				background-color: var(--accent-dark);
			}
		</style>
	</head>
	<body class="bg-background min-h-screen font-sans">
		<!-- Navbar -->
		<nav
			id="navbar"
			class="fixed top-0 left-0 right-0 bg-surface shadow-md border-b-border z-50 flex items-center justify-between px-6 py-3"
		>
			<!-- Logo / Name -->
			<div class="text-primary font-bold text-xl select-none cursor-default">MarketPlace</div>

			<!-- Search Bar -->
			<div class="flex-1 mx-6 max-w-xl">
				<input
					id="searchInput"
					type="search"
					placeholder="Search products..."
					class="w-full border border-border rounded-md px-4 py-2 text-primary focus:outline-none focus:ring-2 focus:ring-primary"
					autocomplete="off"
				/>
			</div>

			<!-- Icons and buttons -->
			<div class="flex items-center space-x-6">
				<!-- Cart icon with count -->
				<button id="cartBtn" class="relative focus:outline-none" aria-label="View cart">
					<svg
						class="w-6 h-6 text-primary hover:text-primary-dark"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						viewBox="0 0 24 24"
						xmlns="http://www.w3.org/2000/svg"
					>
						<path
							stroke-linecap="round"
							stroke-linejoin="round"
							d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.5 6h13"
						></path>
					</svg>
					<span
						id="cartCount"
						class="absolute -top-2 -right-2 bg-error text-white rounded-full text-xs w-5 h-5 flex items-center justify-center"
						>0</span
					>
				</button>

				<!-- Account icon -->
				<button id="accountBtn" class="focus:outline-none" aria-label="Account">
					<svg
						class="w-6 h-6 text-primary hover:text-primary-dark"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						viewBox="0 0 24 24"
						xmlns="http://www.w3.org/2000/svg"
					>
						<path
							stroke-linecap="round"
							stroke-linejoin="round"
							d="M5.121 17.804A9 9 0 0112 15a9 9 0 016.879 2.804M12 12a4 4 0 100-8 4 4 0 000 8z"
						></path>
					</svg>
				</button>

				<!-- Login/Logout Button -->
				<button id="authBtn" class="btn-primary px-4 py-1 rounded-md text-sm font-semibold focus:outline-none">
					Login
				</button>
			</div>
		</nav>
		<!-- Hero Section -->
		<section class="pt-16">
			<img src="../Assets/Hero.PNG" alt="Hero Banner" class="w-full h-auto object-cover" loading="eager" />
		</section>

		<!-- Main Content -->
		<main class="px-6 max-w-7xl mx-auto">
			<h1 class="text-3xl font-bold text-primary mb-6">All Products</h1>

			<section id="productsContainer" class="grid grid-cols-4 gap-6" aria-live="polite" aria-busy="false">
				<!-- Products will be rendered here dynamically -->
			</section>
		</main>

		<!-- Toastify JS -->
		<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

		<script>
			const productsContainer = document.getElementById('productsContainer');
			const cartCountElem = document.getElementById('cartCount');
			const authBtn = document.getElementById('authBtn');

			// Fetch all products once
			async function fetchAllProducts() {
				try {
					const response = await fetch('http://localhost:5000/products/all');
					if (!response.ok) throw new Error('Failed to fetch products');
					const data = await response.json();
					return data;
				} catch (err) {
					Toastify({
						text: 'Error fetching products: ' + err.message,
						duration: 4000,
						close: true,
						gravity: 'top',
						position: 'right',
						backgroundColor: 'var(--error)',
					}).showToast();
					return [];
				}
			}

			// Render a product card
			// 		function renderProduct(product) {
			// 			const { ProductId, ProductName, Description, Price, InStock, ImageUrl, BusinessName, Country } =
			// 				product;
			// 			const card = document.createElement('article');
			// 			card.className =

			//     <img
			//       src="${ImageUrl}"
			//       alt="${ProductName}"
			//       loading="lazy"
			//       class="w-full h-48 object-cover"
			//     />
			//     <div class="p-4 flex flex-col flex-grow">
			//       <h2 class="text-primary font-semibold text-lg truncate">${ProductName}</h2>
			//       <p class="text-secondary text-sm flex-grow mt-1 truncate">${Description}</p>
			//       <p class="mt-2 font-semibold text-primary">${Price} USD</p>
			//       <p
			//         class="mt-1 text-sm font-semibold"
			//         style="color: ${InStock ? 'var(--success)' : 'var(--error)'}"
			//       >
			//         ${InStock ? 'In Stock' : 'Out of Stock'}
			//       </p>
			//       <p class="mt-2 text-xs text-muted">
			//         Seller: ${BusinessName} | ${Country}
			//       </p>
			//     </div>
			//   `;

			// 			return card;
			// 		}

			//================NEW RENDER PRODUCT CARD THAT IS CLICKABLE
			function renderProduct(product) {
				const { ProductId, ProductName, Description, Price, InStock, ImageUrl, BusinessName, Country } =
					product;

				const card = document.createElement('article');
				card.className =
					'bg-surface rounded-lg shadow-sm border border-border overflow-hidden flex flex-col hover:shadow-md transition-shadow cursor-pointer';

				card.innerHTML = `
		<img
			src="${ImageUrl}"
			alt="${ProductName}"
			loading="lazy"
			class="w-full h-48 object-cover"
		/>
		<div class="p-4 flex flex-col flex-grow">
			<h2 class="text-primary font-semibold text-lg truncate">${ProductName}</h2>
			<p class="text-secondary text-sm flex-grow mt-1 truncate">${Description}</p>
			<p class="mt-2 font-semibold text-primary">${Price} USD</p>
			<p
				class="mt-1 text-sm font-semibold"
				style="color: ${InStock ? 'var(--success)' : 'var(--error)'}"
			>
				${InStock ? 'In Stock' : 'Out of Stock'}
			</p>
			<p class="mt-2 text-xs text-muted">
				Seller: ${BusinessName} | ${Country}
			</p>
		</div>
	`;

				// ✅ Add click handler to redirect to product page
				card.addEventListener('click', () => {
					window.location.href = `product.html?id=${ProductId}`;
				});

				return card;
			}

			// Append products to container
			function displayProducts(products) {
				if (products.length === 0) {
					productsContainer.innerHTML = '<p class="text-center text-muted">No products available.</p>';
					return;
				}
				products.forEach((product) => {
					const productCard = renderProduct(product);
					productsContainer.appendChild(productCard);
				});
			}

			// Initialize homepage
			async function init() {
				const products = await fetchAllProducts();
				displayProducts(products);
			}

			// window.addEventListener('load', init);
			window.addEventListener('load', () => {
				init();
				updateAuthButton();
			});
			// Navigate to cart.html when the cart icon is clicked
			document.getElementById('cartBtn').addEventListener('click', () => {
				window.location.href = 'cart.html';
			});

			// Placeholder: Update cart count and auth button text (expand as needed)
			function updateCartCount(count) {
				cartCountElem.textContent = count;
			}

			function updateAuthButton() {
				const token = localStorage.getItem('token');
				if (token) {
					authBtn.textContent = 'Logout';
					authBtn.onclick = () => {
						localStorage.removeItem('token');
						window.location.href = 'login.html';
					};
				} else {
					authBtn.textContent = 'Login';
					authBtn.onclick = () => {
						window.location.href = 'login.html';
					};
				}
			}
		</script>
	</body>
</html>
